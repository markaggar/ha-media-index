[pytest]
testpaths = tests
asyncio_mode = auto
# Exclude the old manual script that requires server-side mutagen/MP4 files
addopts = --ignore=tests/test_mp4_rating.py

markers =
    integration: Tests requiring a live Home Assistant instance (skipped if HA env vars absent)
    unit: Pure Python tests — no HA instance needed

filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
