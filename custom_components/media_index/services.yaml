# Media Index Services

get_random_items:
  name: Get Random Media Items
  description: Get random media items from the index with optional filtering
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    count:
      name: Count
      description: Number of random items to return
      example: 10
      default: 1
      selector:
        number:
          min: 1
          max: 100
          mode: box
    folder:
      name: Folder
      description: Optional folder path to filter by (full path including base folder)
      example: "/media/photo/Photos/2023"
      selector:
        text:
    file_type:
      name: File Type
      description: Filter by file type (image or video)
      example: "image"
      selector:
        select:
          options:
            - "image"
            - "video"
    date_from:
      name: Date From
      description: Filter files with date >= this value (YYYY-MM-DD). Uses EXIF date_taken if available, falls back to created_time.
      example: "2023-01-01"
      selector:
        date:
    date_to:
      name: Date To
      description: Filter files with date <= this value (YYYY-MM-DD). Uses EXIF date_taken if available, falls back to created_time.
      example: "2023-12-31"
      selector:
        date:
    anniversary_month:
      name: Anniversary Month
      description: "Filter by month (1-12) across any year. Use with anniversary_day for 'On This Day' queries. Supports wildcard: use '*' for any month."
      example: "12"
      selector:
        text:
    anniversary_day:
      name: Anniversary Day
      description: "Filter by day of month (1-31) across any year. Use with anniversary_month for 'On This Day' queries. Supports wildcard: use '*' for any day."
      example: "25"
      selector:
        text:
    anniversary_window_days:
      name: Anniversary Window Days
      description: "Expand anniversary match by ±N days. E.g., anniversary_day=7 with window=3 matches days 4-10."
      default: 0
      selector:
        number:
          min: 0
          max: 31
          mode: box
    favorites_only:
      name: Favorites Only
      description: If true, only return files marked as favorites
      default: false
      selector:
        boolean:
    priority_new_files:
      name: Priority New Files
      description: If true, prioritize recently scanned files before random selection
      default: false
      selector:
        boolean:
    new_files_threshold_seconds:
      name: New Files Threshold
      description: Seconds threshold for considering files "new" (default 3600 = 1 hour)
      default: 3600
      selector:
        number:
          min: 60
          max: 86400
          mode: box
    auto_select_burst_favorite:
      name: Auto-Select Burst Favorite
      description: Exclude non-favorite images from burst groups that have an indexed favorite (requires index_burst_groups to have been run first)
      default: false
      selector:
        boolean:

get_ordered_files:
  name: Get Ordered Media Files
  description: Get ordered media files with configurable sort field and direction
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    count:
      name: Count
      description: Maximum number of files to return
      default: 50
      selector:
        number:
          min: 1
          max: 1000
          mode: box
    folder:
      name: Folder
      description: Folder path to filter by (full path including base folder)
      example: "/media/photo/Photos/2023"
      selector:
        text:
    recursive:
      name: Recursive
      description: Include subfolders (sorts across all files when true)
      default: true
      selector:
        boolean:
    file_type:
      name: File Type
      description: Filter by file type (image or video)
      example: "image"
      selector:
        select:
          options:
            - "image"
            - "video"
    order_by:
      name: Order By
      description: Which field to sort by
      default: "date_taken"
      selector:
        select:
          options:
            - label: "Date Taken (EXIF)"
              value: "date_taken"
            - label: "Filename (Alphabetical)"
              value: "filename"
            - label: "Path (Folder Hierarchy)"
              value: "path"
            - label: "Modified Time (Filesystem)"
              value: "modified_time"
    order_direction:
      name: Order Direction
      description: Sort direction (ascending or descending)
      default: "desc"
      selector:
        select:
          options:
            - label: "Descending (Newest/Z-A First)"
              value: "desc"
            - label: "Ascending (Oldest/A-Z First)"
              value: "asc"
    date_from:
      name: Date From
      description: Include only files taken on or after this date (YYYY-MM-DD).
      required: false
      selector:
        text:
    date_to:
      name: Date To
      description: Include only files taken on or before this date (YYYY-MM-DD).
      required: false
      selector:
        text:
    after_value:
      name: After Value (cursor)
      description: >
        Compound cursor for stable pagination. Pass the `next_cursor.after_value`
        from the previous response to fetch the next page. Must be used together
        with `after_id`.
      required: false
      selector:
        text:
    after_id:
      name: After ID (cursor)
      description: >
        Compound cursor tie-breaker. Pass the `next_cursor.after_id` from the
        previous response. Must be used together with `after_value`.
      required: false
      selector:
        number:
          min: 1

get_file_metadata:
  name: Get File Metadata
  description: Get detailed metadata for a specific file
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    file_path:
      name: File Path
      description: Full filesystem path to the media file (use either this OR media_source_uri)
      required: false
      example: "/media/photo/Photos/2023/vacation.jpg"
      selector:
        text:
    media_source_uri:
      name: Media Source URI
      description: Media-source URI (use either this OR file_path)
      required: false
      example: "media-source://media_source/media/photo/Photos/2023/vacation.jpg"
      selector:
        text:

get_related_files:
  name: Get Related Files
  description: Get files related to a reference photo (burst detection - photos taken within minutes)
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    mode:
      name: Mode
      description: Type of related files to find
      required: true
      selector:
        select:
          options:
            - label: "Burst (photos within minutes)"
              value: "burst"
    reference_path:
      name: Reference File Path
      description: Full filesystem path to the reference media file (use media_source_uri instead when possible)
      required: false
      example: "/media/photo/Photos/2023/IMG_1234.jpg"
      selector:
        text:
    media_source_uri:
      name: Media Source URI
      description: Media-source URI for the reference media file (recommended)
      required: false
      example: "media-source://media_source/media/photo/Photos/2023/IMG_1234.jpg"
      selector:
        text:
    window_days:
      name: Window Days (Anniversary Mode)
      description: Days before/after reference date to include (anniversary mode only, e.g., 3 = ±3 days)
      default: 3
      selector:
        number:
          min: 0
          max: 30
          mode: box
    years_back:
      name: Years Back (Anniversary Mode)
      description: How many years back to search (anniversary mode only)
      default: 15
      selector:
        number:
          min: 1
          max: 50
          mode: box
    sort_order:
      name: Sort Order
      description: How to order results
      default: "time_asc"
      selector:
        select:
          options:
            - label: "Time Ascending (Chronological)"
              value: "time_asc"
            - label: "Time Descending (Reverse)"
              value: "time_desc"

geocode_file:
  name: Geocode File
  description: Get location name for a file with GPS coordinates (cache-first, on-demand)
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    file_id:
      name: File ID
      description: Database ID of the file to geocode
      required: false
      selector:
        number:
          min: 1
          mode: box
    file_path:
      name: File Path
      description: Full filesystem path to the media file (use this OR file_id OR media_source_uri)
      required: false
      example: "/media/photo/Photos/2023/vacation.jpg"
      selector:
        text:
    media_source_uri:
      name: Media Source URI
      description: Media-source URI (use this OR file_id OR file_path)
      required: false
      example: "media-source://media_source/media/photo/Photos/2023/vacation.jpg"
      selector:
        text:
    latitude:
      name: Latitude
      description: GPS latitude (alternative to file_id/file_path/media_source_uri)
      required: false
      selector:
        number:
          min: -90
          max: 90
          mode: box
    longitude:
      name: Longitude
      description: GPS longitude (alternative to file_id/file_path/media_source_uri)
      required: false
      selector:
        number:
          min: -180
          max: 180
          mode: box

scan_folder:
  name: Scan Folder
  description: Manually trigger a folder scan
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    folder_path:
      name: Folder Path
      description: Folder to scan (defaults to base folder if not specified)
      example: "/media/photo/Photos"
      selector:
        text:
    force_rescan:
      name: Force Rescan
      description: Force re-scan of all files even if unchanged
      default: false
      selector:
        boolean:

mark_favorite:
  name: Mark File as Favorite
  description: Mark a file as favorite (updates EXIF and database)
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    file_path:
      name: File Path
      description: Full filesystem path to the media file (use either this OR media_source_uri)
      required: false
      example: "/media/photo/Photos/2023/vacation.jpg"
      selector:
        text:
    media_source_uri:
      name: Media Source URI
      description: Media-source URI (use either this OR file_path)
      required: false
      example: "media-source://media_source/media/photo/Photos/2023/vacation.jpg"
      selector:
        text:
    is_favorite:
      name: Is Favorite
      description: True to mark as favorite, False to unmark
      default: true
      selector:
        boolean:

delete_media:
  name: Delete Media File
  description: Move a media file to the junk folder (soft delete)
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    file_path:
      name: File Path
      description: Full filesystem path to the media file (use either this OR media_source_uri)
      required: false
      example: "/media/photo/Photos/2023/bad_hair_day.jpg"
      selector:
        text:
    media_source_uri:
      name: Media Source URI
      description: Media-source URI (use either this OR file_path)
      required: false
      example: "media-source://media_source/media/photo/Photos/2023/bad_hair_day.jpg"
      selector:
        text:

mark_for_edit:
  name: Mark File for Editing
  description: Move a media file to the edit folder for processing
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    file_path:
      name: File Path
      description: Full filesystem path to the media file (use either this OR media_source_uri)
      required: false
      example: "/media/photo/Photos/2023/needs_editing.jpg"
      selector:
        text:
    media_source_uri:
      name: Media Source URI
      description: Media-source URI (use either this OR file_path)
      required: false
      example: "media-source://media_source/media/photo/Photos/2023/needs_editing.jpg"
      selector:
        text:

restore_edited_files:
  name: Restore Edited Files
  description: Restore files from the edit folder back to their original locations
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    folder_filter:
      name: Folder Filter
      description: Filter by destination folder (defaults to "_Edit")
      default: "_Edit"
      example: "_Edit"
      selector:
        text:
    file_path:
      name: File Path
      description: Optional - restore only this specific file
      example: "/media/photo/Photos/2023/edited_photo.jpg"
      selector:
        text:
    clear_failed:
      name: Clear Failed Records
      description: If true, failed restores (file missing, destination exists) are removed from the pending queue so they won't appear again.
      default: false
      selector:
        boolean:

restore_deleted_files:
  name: Restore Deleted Files
  description: Restore files from the junk folder back to their original locations
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    file_path:
      name: File Path
      description: Optional - restore only this specific file from _Junk. Omit to restore all pending deleted files.
      example: "/media/photo/_Junk/bad_hair_day.jpg"
      selector:
        text:
    clear_failed:
      name: Clear Failed Records
      description: If true, failed restores (file missing, destination exists) are removed from the pending queue so they won't appear again.
      default: false
      selector:
        boolean:

cleanup_database:
  name: Cleanup Database
  description: Remove database entries for files that no longer exist on the filesystem
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    dry_run:
      name: Dry Run
      description: If true, only report what would be deleted without actually deleting
      default: true
      selector:
        boolean:

update_burst_metadata:
  name: Update Burst Metadata
  description: Write burst_favorites metadata to all files in a burst group
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    burst_files:
      name: Burst Files
      description: List of all file URIs in the burst group
      required: true
      example: ["media-source://media_source/media/photo/burst/IMG_001.jpg", "media-source://media_source/media/photo/burst/IMG_002.jpg"]
      selector:
        object:
    favorited_files:
      name: Favorited Files
      description: List of file URIs that were marked as favorites
      required: true
      example: ["media-source://media_source/media/photo/burst/IMG_001.jpg"]
      selector:
        object:

check_file_exists:
  name: Check File Exists
  description: Lightweight filesystem check to verify if a file exists (no metadata loading)
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    file_path:
      name: File Path
      description: Full filesystem path to check
      example: "/media/photo/Photos/2023/IMG_001.jpg"
      selector:
        text:
    media_source_uri:
      name: Media Source URI
      description: Media-source URI to check (alternative to file_path)
      example: "media-source://media_source/media/photo/Photos/2023/IMG_001.jpg"
      selector:
        text:

find_duplicate_files:
  name: Find Duplicate Files
  description: >
    Find files within burst groups that are filesystem-level duplicates (same
    file_size, date_taken, width, and height). Requires index_burst_groups to have
    been run first so that burst_id values are populated.
    Keeper selection is folder-pair aware: the folder contributing more duplicate
    files across all pairs is kept globally, so keepers are not scattered randomly
    between two folders. With dry_run=true (default) returns the duplicate groups
    without touching any files. With dry_run=false and auto_delete=true, non-keeper
    duplicates are moved to the _Junk folder.
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    folder:
      name: Folder
      description: Limit the search to files under this folder prefix. Omit to search the entire library.
      required: false
      example: "/media/photo/PhotoLibrary"
      selector:
        text:
    prefer_folder:
      name: Prefer Folder
      description: >
        If supplied, this folder is always chosen as the keeper folder for any
        duplicate pair it appears in, overriding the automatic majority-vote logic.
      required: false
      example: "/media/photo/PhotoLibrary"
      selector:
        text:
    dry_run:
      name: Dry Run
      description: >
        If true (default), only reports duplicate groups without deleting anything.
        Set to false together with auto_delete=true to actually move duplicates to _Junk.
      required: false
      default: true
      selector:
        boolean:
    auto_delete:
      name: Auto Delete
      description: >
        If true, non-keeper duplicates are moved to the _Junk folder when dry_run=false.
        Has no effect when dry_run=true.
      required: false
      default: false
      selector:
        boolean:

index_burst_groups:
  name: Index Burst Groups
  description: >
    Scan the entire indexed library and write burst_count / burst_favorites to every
    file that belongs to a detected burst group. Designed for large collections
    (200 K+ items). Uses a single sorted pass — no per-file queries. Run this once
    after the initial library scan, or whenever you want to refresh burst data across
    the whole library.
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    folder:
      name: Folder
      description: Limit the scan to files under this folder prefix. Omit to scan the entire library.
      required: false
      example: "/media/photo/PhotoLibrary/Bursts"
      selector:
        text:
    time_window_seconds:
      name: Time Window (seconds)
      description: Maximum gap in seconds between consecutive photos in the same burst group.
      required: false
      default: 10
      selector:
        number:
          min: 1
          max: 300
          unit_of_measurement: s
    location_tolerance_meters:
      name: Location Tolerance (metres)
      description: GPS radius in metres for grouping photos at the same location. Set to 0 to group by time only (ignore GPS). Photos without GPS coordinates are always grouped by time only.
      required: false
      default: 50
      selector:
        number:
          min: 0
          max: 1000
          unit_of_measurement: m
    min_group_size:
      name: Minimum Group Size
      description: Minimum number of photos required to be considered a burst group.
      required: false
      default: 2
      selector:
        number:
          min: 2
          max: 20
    overwrite_existing:
      name: Overwrite Existing
      description: >
        If true (default), recalculate and overwrite burst_count / burst_favorites for all
        matching files. If false, only populate files that have no existing burst_count.
      required: false
      default: true
      selector:
        boolean:

update_sync_state:
  name: Update Sync State
  description: >
    Write the current navigation queue and position for a named sync group to the
    media-index database, then fire a media_index.sync_updated event so all
    subscribers (cards, cast devices) receive it immediately. Callable by any
    authenticated user — no admin rights required.
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    sync_group:
      name: Sync Group
      description: Identifier for the shared queue (must match shared_queue_id on all cards in the group).
      required: true
      example: "living_room_slideshow"
      selector:
        text:
    queue:
      name: Queue
      description: List of media_content_id values (up to 20 most recent items will be stored).
      required: true
      example: ["media-source://media_source/media/photo/Photos/IMG_001.jpg"]
      selector:
        object:
    current_index:
      name: Current Index
      description: Zero-based index of the currently displayed item within the queue list.
      required: true
      example: 4
      selector:
        number:
          min: 0

get_stream_url:
  name: Get Stream URL
  description: "PoC: Generate a short HMAC-signed streaming URL for a media file, for testing Roku ECP cast. Returns the URL plus file metadata."
  target:
    entity:
      integration: media_index
  fields:
    path_contains:
      name: Path Contains
      description: Partial filename or path string to search for (case-insensitive). Returns the first matching file.
      required: false
      example: "20230806_160109.mp4"
      selector:
        text:
    file_id:
      name: File ID
      description: Exact database file ID to generate a URL for. Takes precedence over path_contains if both are provided.
      required: false
      example: 1234
      selector:
        number:
          min: 1
    ttl:
      name: TTL (seconds)
      description: How long the URL remains valid. Defaults to 3600 (1 hour).
      required: false
      example: 3600
      selector:
        number:
          min: 60
          max: 86400

get_sync_state:
  name: Get Sync State
  description: >
    Return the stored navigation queue and current position for a named sync group.
    Used by cards on reconnect to pick up where the other device left off.
  target:
    entity:
      integration: media_index
      domain: sensor
  fields:
    sync_group:
      name: Sync Group
      description: Identifier for the shared queue to retrieve.
      required: true
      example: "living_room_slideshow"
      selector:
        text:

roku_ecp_cast:
  name: Roku ECP Cast (xcast)
  description: >
    Cast media to a Roku device via the xcast app (ECP app ID 687485), bypassing
    HA's play_media service. Generates a signed stream URL, properly percent-encodes it,
    and POSTs to the xcast ECP endpoint server-side — avoiding browser CORS restrictions.
    Supports both video and image content. For images, automatically applies EXIF
    orientation as a radians rotation value so portrait photos display correctly.
  target:
    entity:
      integration: media_index
  fields:
    roku_entity_id:
      name: Roku Entity
      description: The media_player entity of the Roku device to cast to.
      required: true
      example: "media_player.roku_tv"
      selector:
        entity:
          domain: media_player
    media_source_uri:
      name: Media Source URI
      description: media-source:// URI of the file (preferred — from media_index item). One of media_source_uri, file_path, file_id, or path_contains is required.
      required: false
      example: "media-source://media_source/media/Photo/PhotoLibrary/2024/IMG_1234.jpg"
      selector:
        text:
    file_path:
      name: File Path
      description: Exact filesystem path of the file. Used when media_source_uri is not available.
      required: false
      example: "/media/Photo/PhotoLibrary/2024/IMG_1234.jpg"
      selector:
        text:
    file_id:
      name: File ID
      description: Database file ID. Takes precedence over path_contains and file_path.
      required: false
      selector:
        number:
          min: 1
    path_contains:
      name: Path Contains
      description: Partial path/filename substring — matches first result.
      required: false
      example: "20230806_160109.mp4"
      selector:
        text:
    ttl:
      name: TTL (seconds)
      description: Signed URL validity period. Defaults to 3600 (1 hour).
      required: false
      example: 3600
      selector:
        number:
          min: 60
          max: 86400
    start_position_seconds:
      name: Start Position (seconds)
      description: >
        Optional playback start position in seconds. When provided, appends
        contentPosition={ms} to the xcast ECP URL so Roku buffers from that
        point instead of the beginning. Use this for seek re-push.
      required: false
      example: 45.0
      selector:
        number:
          min: 0
          step: 0.1
          unit_of_measurement: s

roku_ecp_query:
  name: Roku ECP Query Media Player
  description: >
    Queries the current playback state of a Roku device directly via ECP
    (http://{roku_host}:8060/query/media-player), bypassing HA's media_player
    entity which has up to an 8-second polling lag. Returns the player state,
    current position, and total duration so the card can keep its local video
    clock in sync with what the Roku is playing.
  fields:
    roku_entity_id:
      name: Roku Entity
      description: The media_player entity of the Roku device to query.
      required: true
      example: "media_player.roku_tv"
      selector:
        entity:
          domain: media_player

roku_ecp_keypress:
  name: Roku ECP Keypress
  description: >
    Sends an ECP keypress directly to a Roku device bypassing the HA media_player
    entity (which has an ~8s polling lag). Use for timing-sensitive actions such
    as pausing video a few seconds before it ends to prevent xcast returning to
    its splash screen.
    Common keypresses: Play (toggle), Pause, Home, Back, Fwd, Rev.
  fields:
    roku_entity_id:
      name: Roku Entity
      description: The media_player entity of the Roku device.
      required: true
      example: "media_player.roku_tv"
      selector:
        entity:
          domain: media_player
    keyname:
      name: Key Name
      description: ECP key name to press. Letters, digits, hyphens, and underscores only.
      required: true
      example: "Play"
      selector:
        text:

stop_cast:
  name: Stop Cast (Roku)
  description: >
    Send a Home keypress to a Roku device via ECP, dismissing the xcast app
    and clearing the cast image from the screen. Use this to stop a single
    direct cast pushed by roku_ecp_cast. To stop a mirror or slideshow session
    use stop_cast_slideshow instead.
  fields:
    roku_entity_id:
      name: Roku Entity
      description: The media_player entity of the Roku device to stop.
      required: true
      example: "media_player.roku_tv"
      selector:
        entity:
          domain: media_player

start_cast_slideshow:
  name: Start Cast Slideshow
  description: >
    Start an unattended random-batch slideshow on a media_player entity.
    Picks random files from the database in batches of 100, casting each one
    in turn. Supports all the same filters as get_random_items. The slideshow
    runs until stopped with stop_cast_slideshow.
  target:
    entity:
      integration: media_index
  fields:
    media_player_entity_id:
      name: Media Player
      description: The media_player entity to cast to. For Roku devices, ECP is used automatically for better orientation and format handling.
      required: true
      example: "media_player.roku_tv"
      selector:
        entity:
          domain: media_player
    interval:
      name: Interval (seconds)
      description: >
        How long to display each image before moving to the next. For videos,
        the actual duration is used automatically (minus video_overlap seconds).
      required: false
      default: 10
      selector:
        number:
          min: 1
          max: 3600
          unit_of_measurement: s
    video_overlap:
      name: Video Overlap (seconds)
      description: >
        Start loading the next item this many seconds before the current video
        would naturally end. Ignored for images. Set to 1-2 if you see a brief
        black screen between videos.
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 30
          unit_of_measurement: s
    sync_group:
      name: Sync Group
      description: >
        Optional shared queue group ID. When set, the slideshow also writes its
        current state to the sync group so paired cards can follow along.
      required: false
      selector:
        text:
    also_write_sync:
      name: Also Write Sync
      description: >
        Write the current item to the sync group on each advance so cards in
        the same sync group follow the slideshow.
      required: false
      default: false
      selector:
        boolean:
    folder:
      name: Folder
      description: Limit files to this folder (supports media-source:// URIs).
      required: false
      selector:
        text:
    recursive:
      name: Recursive
      description: Include files in sub-folders.
      required: false
      default: true
      selector:
        boolean:
    file_type:
      name: File Type
      description: "Filter by type: image or video."
      required: false
      selector:
        select:
          options:
            - image
            - video
    date_from:
      name: Date From
      description: Include only files taken on or after this date (YYYY-MM-DD).
      required: false
      selector:
        text:
    date_to:
      name: Date To
      description: Include only files taken on or before this date (YYYY-MM-DD).
      required: false
      selector:
        text:
    favorites_only:
      name: Favorites Only
      description: Include only favorited files.
      required: false
      default: false
      selector:
        boolean:
    anniversary_month:
      name: Anniversary Month
      description: Include files taken in this month (1-12) for anniversary filtering.
      required: false
      selector:
        number:
          min: 1
          max: 12
    anniversary_day:
      name: Anniversary Day
      description: Include files taken on this day of the month for anniversary filtering.
      required: false
      selector:
        number:
          min: 1
          max: 31
    anniversary_window_days:
      name: Anniversary Window (days)
      description: Number of days either side of the anniversary date to include.
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 30
    priority_new_files:
      name: Priority New Files
      description: Prioritise files that have not yet been shown.
      required: false
      default: false
      selector:
        boolean:

stop_cast_slideshow:
  name: Stop Cast Slideshow
  description: >
    Stop a cast slideshow or mirror session. If entity_id is omitted, all
    active cast sessions are stopped.
  fields:
    media_player_entity_id:
      name: Media Player
      description: >
        The media_player entity whose cast session should be stopped. Omit to
        stop all active sessions.
      required: false
      example: "media_player.roku_tv"
      selector:
        entity:
          domain: media_player

mirror_to_cast:
  name: Mirror to Cast
  description: >
    Mirror a media-card shared queue group to a media_player entity in
    real-time. Every time the card advances (or the sync state is updated by
    any source), the same media is pushed to the TV. Stop with
    stop_cast_slideshow.
  target:
    entity:
      integration: media_index
  fields:
    media_player_entity_id:
      name: Media Player
      description: The media_player entity to mirror to. For Roku devices, ECP is used automatically for better orientation and format handling.
      required: true
      example: "media_player.roku_tv"
      selector:
        entity:
          domain: media_player
    sync_group:
      name: Sync Group
      description: The shared queue group ID to mirror from.
      required: true
      example: "my_photo_frame"
      selector:
        text:
    pre_end_pause:
      name: Pre-End Pause
      description: >
        Pause the TV a few seconds before a video would naturally end, so it
        doesn't loop or show a black screen while the next item loads.
      required: false
      default: true
      selector:
        boolean:
    video_overlap:
      name: Video Overlap (seconds)
      description: >
        Issue the pause command this many seconds before a video ends.
      required: false
      default: 2
      selector:
        number:
          min: 0
          max: 30
          unit_of_measurement: s
